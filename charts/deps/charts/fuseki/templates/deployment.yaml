apiVersion: apps/v1
kind: Deployment
metadata:
  name: fuseki
  namespace: {{ .Release.Namespace }}
  labels:
    app: fuseki
    app.kubernetes.io/name: fuseki
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
spec:
  replicas: {{ .Values.replicaCount }}
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: fuseki
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app: fuseki
        app.kubernetes.io/name: fuseki
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      containers:
        - name: fuseki
          image: {{ .Values.image.repository }}:{{ .Values.image.tag }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 3030
              protocol: TCP
          env:
            - name: JVM_ARGS
              value: {{ .Values.jvmArgs | quote }}
            - name: ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.adminPassword.secretName }}
                  key: {{ .Values.adminPassword.secretKey }}
            {{- with .Values.extraEnvs }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          {{- if .Values.persistence.enabled }}
          volumeMounts:
            - name: fuseki-data
              mountPath: /fuseki
          {{- end }}
      {{- if .Values.persistence.enabled }}
      volumes:
        - name: fuseki-data
          persistentVolumeClaim:
            claimName: fuseki-data
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
