{{- if (((.Values.openmetadata.config.pipelineServiceClientConfig).argoWorkflows).customConfig).enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "OpenMetadata.fullname" . }}-ingestion-config
  namespace: {{ .Release.Namespace | quote }}
  labels:
    {{- include "OpenMetadata.labels" . | nindent 4 }}
data:
  container-params.yaml: |
    {{- toYaml ((((.Values.openmetadata.config.pipelineServiceClientConfig).argoWorkflows).customConfig).containerParams | default dict) | nindent 4 }}
  workflow-params.yaml: |
    {{- toYaml ((((.Values.openmetadata.config.pipelineServiceClientConfig).argoWorkflows).customConfig).workflowParams | default dict) | nindent 4 }}
{{- end }}
