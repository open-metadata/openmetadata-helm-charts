name: Release Open Metadata Charts

on:
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "$GITHUB_ACTOR"
          git config user.email "$GITHUB_ACTOR@users.noreply.github.com"

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          token: "${{ secrets.GITHUB_TOKEN }}"
      
      - name: Add Helm repos
        run: |
          helm repo add opensearch https://opensearch-project.github.io/helm-charts/
          helm repo add mysql https://charts.bitnami.com/bitnami
          helm repo add airflow https://airflow.apache.org

      - name: Run chart-releaser
        uses: helm/chart-releaser-action@v1.7.0
        with:
          charts_repo_url: https://helm.open-metadata.org
        env:
          CR_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
          HELM_EXPERIMENTAL_OCI: "1"

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u "$GITHUB_ACTOR" --password-stdin

      - name: Push charts to GHCR as OCI artifacts
        run: |
          for chart in openmetadata deps; do
            helm dependency build charts/$chart
            helm package charts/$chart -d .cr-release-packages
          done
          for pkg in .cr-release-packages/*.tgz; do
            helm push "$pkg" oci://ghcr.io/open-metadata/openmetadata-helm-charts
          done
